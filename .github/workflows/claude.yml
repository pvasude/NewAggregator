name: Claude Code
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            When triggered by a comment containing "@claude review stage:1",
            "@claude review stage:2", or "@claude review stage:3":
            1. Read .claude/skills/review/SKILL.md for review instructions
            2. Read CLAUDE.md for project-specific rules and known deviations
            3. Run the review at the declared stage following the skill exactly
            4. Post results as a PR comment using the output format in the skill

            For all other @claude mentions, respond helpfully using
            project context from CLAUDE.md and available skills.
